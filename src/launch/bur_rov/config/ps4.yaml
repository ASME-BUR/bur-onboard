joy:
    ros__parameters:
      deadzone: 0.01
      autorepeat_rate: 20.0
      coalesce_interval_ms: 1
      sticky_buttons: True

joy_command:
  ros__parameters:
    joy_topic: "joy"
    depth_topic: "depth_sensor"
    pose_topic: "set_pose"
    twist_topic: "set_twist"
    publish_rate: 100
    imu_topic: "imu"
    multiplier: 2.0
    cmd_pub_topic: "command"
    axis_mapping.linear_x: 4
    axis_mapping.linear_y: 3
    axis_mapping.linear_z: 1
    axis_mapping.angular_x: 0
    axis_mapping.angular_y: 0
    axis_mapping.angular_z: 6
