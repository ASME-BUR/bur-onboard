services:
  bur-onboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile_v1
    entrypoint: /bin/bash
    tty: true
    volumes:
      - ../:/root/2024-2025
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    environment:
      - DISPLAY
      - WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR
      - PULSE_SERVER
